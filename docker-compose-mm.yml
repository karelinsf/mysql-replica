services:
  mysql-master-1:
    image: mysql:8.4
    container_name: mysql-master-1
    environment:
      MYSQL_ROOT_PASSWORD: 12345
    ports:
      - "3307:3306"
    volumes:
      - ./master-master/master1.sql:/docker-entrypoint-initdb.d/start.sql
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --mysql_native_password=ON
  mysql-master-2:
    image: mysql:8.4
    container_name: mysql-master-2
    environment:
      MYSQL_ROOT_PASSWORD: 12345
    ports:
      - "3308:3306"
    volumes:
      - ./master-master/master2.sql:/docker-entrypoint-initdb.d/start.sql
    command:
      - --server-id=2
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --mysql_native_password=ON